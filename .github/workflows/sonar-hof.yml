name: Sonar Hall of Fame

on:
  workflow_dispatch:

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf libtool pkg-config libapr1-dev \
            libaprutil1-dev libpcre2-dev unzip curl

      - name: Download Sonar build-wrapper
        run: |
          curl -sSLo build-wrapper.zip https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip -q build-wrapper.zip

      - name: Configure httpd
        id: configure
        continue-on-error: true
        run: |
          if [ -x ./buildconf ]; then
            ./buildconf
          fi
          ./configure \
            --with-apr=/usr/bin/apr-1-config \
            --with-apr-util=/usr/bin/apu-1-config \
            --disable-shared \
            --enable-static

      - name: Build with Sonar build-wrapper
        id: build
        continue-on-error: true
        run: ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 --out-dir bw-output make -j2

      - name: Check compilation database
        id: bw
        run: |
          count=0
          if [ -s bw-output/compile_commands.json ]; then
            count=$(python3 - <<'PY'
import json
try:
    with open("bw-output/compile_commands.json", "r", encoding="utf-8") as f:
        data = json.load(f)
    print(len(data) if isinstance(data, list) else 0)
except Exception:
    print(0)
PY
)
          fi
          echo "compile_commands_count=$count"
          if [ "$count" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: SonarCloud scan with compilation database
        if: steps.bw.outputs.exists == 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: -Dsonar.cfamily.compile-commands=bw-output/compile_commands.json
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud scan with AutoConfig fallback
        if: steps.bw.outputs.exists != 'true'
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
